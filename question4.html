<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngularJS Greeting App - Question 4</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-app="myApp">
    <div ng-controller="GreetingController">
        <form name="emailForm">
            <label for="emailField">Email:</label>
            <input id="emailField" type="email" ng-model="email" name="emailField" required placeholder="Enter email address">
            <span ng-show="emailForm.emailField.$error.email && emailForm.emailField.$touched" style="color: red;">Please enter a valid email address.</span>
            <br>
            <button type="submit" ng-disabled="emailForm.$invalid">Submit Email</button>
        </form>
    </div>

    <script>
        angular.module('myApp', [])
            .controller('GreetingController', function($scope) {
                $scope.email = '';
            });
    </script>
</body>
</html>
